name: douban daily sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"  # 每天 16:00 UTC (北京时间 00:00)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  book_sync:
    name: Sync Book
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      DOUBAN_NAME: ${{ secrets.DOUBAN_NAME }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate import
        run: python -m compileall douban2notion
      - name: Restore last sync timestamp
        uses: actions/download-artifact@v4
        with:
          name: sync-timestamp
          path: .
        continue-on-error: true
      - name: Set sync-since
        run: |
          if [ -f last_success_time.txt ]; then
            echo "SYNC_SINCE=$(cat last_success_time.txt)" >> $GITHUB_ENV
            echo "从上次成功时间同步: $(cat last_success_time.txt)"
          else
            echo "SYNC_SINCE=" >> $GITHUB_ENV
            echo "首次运行：全量同步"
          fi
      - name: Sync book
        run: python -m douban2notion.douban book ${SYNC_SINCE:+--since "$SYNC_SINCE"}

  movie_sync:
    name: Sync Movie
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      DOUBAN_NAME: ${{ secrets.DOUBAN_NAME }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      TMDB_ID_OVERRIDE_JSON: ${{ secrets.TMDB_ID_OVERRIDE_JSON }}
      IMDB_TITLE_ALIAS_JSON: ${{ secrets.IMDB_TITLE_ALIAS_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate import
        run: python -m compileall douban2notion
      - name: Restore last sync timestamp
        uses: actions/download-artifact@v4
        with:
          name: sync-timestamp
          path: .
        continue-on-error: true
      - name: Set sync-since
        run: |
          if [ -f last_success_time.txt ]; then
            echo "SYNC_SINCE=$(cat last_success_time.txt)" >> $GITHUB_ENV
            echo "从上次成功时间同步: $(cat last_success_time.txt)"
          else
            echo "SYNC_SINCE=" >> $GITHUB_ENV
            echo "首次运行：全量同步"
          fi
      - name: Sync movie
        run: python -m douban2notion.douban movie --dedupe-duplicates ${SYNC_SINCE:+--since "$SYNC_SINCE"}

  save-timestamp:
    name: Save Sync Timestamp
    runs-on: ubuntu-latest
    needs: [book_sync, movie_sync]
    if: success()
    steps:
      - name: Record success time
        run: date -u +%Y-%m-%dT%H:%M:%SZ > last_success_time.txt
      - name: Save timestamp artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-timestamp
          path: last_success_time.txt
          retention-days: 90
          overwrite: true

  cover_validation:
    name: Validate & Repair Covers
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [book_sync, movie_sync]
    if: success()
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate and repair covers
        run: python -m douban2notion.cover_validator all

  playwright_enrichment:
    name: Playwright Enrichment (Douban)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [cover_validation]
    if: success()
    env:
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Enrich Actor/Director/Book covers
        run: python -m douban2notion.playwright_enricher all
