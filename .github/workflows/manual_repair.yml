name: manual repair

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Repair scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - movie
          - book
          - actor
          - director
          - author
      skip_audit:
        description: "Skip data audit (only run cover repair)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Data Audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ !inputs.skip_audit }}
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run data audit
        run: python -u -m douban2notion.data_audit ${{ inputs.scope }} --skip-url-check --enable-person-name-mismatch

  cover_repair:
    name: Cover Repair
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [audit]
    if: ${{ always() && (needs.audit.result == 'success' || inputs.skip_audit) }}
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate and repair covers
        run: python -m douban2notion.cover_validator ${{ inputs.scope }}
