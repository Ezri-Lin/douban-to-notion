name: notion data audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit Data Issues
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate import
        run: python -m compileall douban2notion

      - name: Audit all data
        run: python -m douban2notion.data_audit all
