name: notion cover validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Covers
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate and repair covers
        run: |
          python -m douban2notion.cover_validator all
