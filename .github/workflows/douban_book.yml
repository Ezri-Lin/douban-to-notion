name: douban book sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Book
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      BOOK_NOTION_TOKEN: ${{ secrets.BOOK_NOTION_TOKEN }}
      NOTION_BOOK_URL: ${{ secrets.NOTION_BOOK_URL }}
      DOUBAN_NAME: ${{ secrets.DOUBAN_NAME }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate import
        run: python -m compileall douban2notion
      - name: Sync book
        run: python -m douban2notion.douban book
