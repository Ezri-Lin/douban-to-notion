name: douban movie sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Movie
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MOVIE_NOTION_TOKEN: ${{ secrets.MOVIE_NOTION_TOKEN }}
      NOTION_MOVIE_URL: ${{ secrets.NOTION_MOVIE_URL }}
      DOUBAN_NAME: ${{ secrets.DOUBAN_NAME }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      TMDB_ID_OVERRIDE_JSON: ${{ secrets.TMDB_ID_OVERRIDE_JSON }}
      IMDB_TITLE_ALIAS_JSON: ${{ secrets.IMDB_TITLE_ALIAS_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate import
        run: python -m compileall douban2notion
      - name: Sync movie
        run: python -m douban2notion.douban movie --dedupe-duplicates --recent-days 3
